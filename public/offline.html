<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SA Film Academy - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Outfit', 'DM Sans', sans-serif;
      background: #F8F7F5;
      color: #1A1815;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #CC0000;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
      color: rgba(26, 24, 21, 0.65);
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: #CC0000;
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.3s ease;
    }
    a:hover {
      background: #FE2020;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
